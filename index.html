<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Live Agent</title>
    <style>
        /* Base Styling */
        body { background-color: #000000; color: #ffffff; margin: 0; font-family: 'Montserrat', sans-serif; }

        /* Widget Container */
        #usd-voice-widget { position: fixed; bottom: 30px; right: 30px; z-index: 99999; display: flex; flex-direction: column; align-items: flex-end; }

        /* The Main Chat Box (Rectangle 4222 specs) */
        #usd-chat-container {
            width: 400px;
            height: 652px;
            background-color: #000000;
            border-radius: 15px;
            padding: 24px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            border: 1px solid #333;
            position: relative;
        }

        /* Ultimate Ai Text Styles */
        .usd-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 22px;
            background: linear-gradient(270deg, #BE9644 0.01%, #AA803C 15.01%, #F3DC87 43.01%, #FBEFAC 59.01%, #F3DC87 73.01%, #AA803C 93.01%, #C49D47 100.01%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* Input Area (Text area specs) */
        #usd-input-container {
            width: 376px;
            height: 55px;
            background: rgba(27, 27, 27, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            margin-top: auto;
        }

        #usd-text-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-size: 15px;
        }

        /* Floating Trigger Button (120x120) */
        #usd-bubble {
            width: 120px;
            height: 120px;
            background-image: url('https://ultimatesmiledesign.com/static/voice-agent.png');
            background-size: cover;
            cursor: pointer;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        #usd-bubble:hover { transform: scale(1.05); }

        /* Remaining styles from original logic... */
        #usd-tooltip { background: #D4AF37; color: #111; padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; }
        #usd-chat-log { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; }
        .msg { margin-bottom: 12px; font-size: 15px; }
        .msg-bot { color: #D4AF37; }
        .usd-link-card { background: linear-gradient(135deg, #111, #222); border: 1px solid #D4AF37; color: #D4AF37; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 5px; width: 100%; }

        @media (max-width: 480px) {
            #usd-chat-container { width: 90vw; height: 80vh; }
            #usd-bubble { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <div id="usd-voice-widget">
        <div id="usd-tooltip" onclick="openChat(false)">Namaste! Tap here to talk about your new smile!</div>

        <div id="usd-chat-container">
            <div class="usd-title">Ultimate Ai</div>
            <div id="usd-chat-log"></div>
            
            <div id="usd-input-container">
                <input type="text" id="usd-text-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button onclick="submitTextMessage()" style="background:none; border:none; color:#D4AF37; cursor:pointer;">Send</button>
            </div>
        </div>
        
        <div id="usd-bubble" onclick="openChat(false)"></div>
    </div>

    <script>
        // Keeping your functional logic intact
        function openChat() {
            document.getElementById('usd-chat-container').style.display = 'flex';
            document.getElementById('usd-bubble').style.display = 'none';
            document.getElementById('usd-tooltip').style.display = 'none';
        }

        function submitTextMessage() {
            const input = document.getElementById('usd-text-input');
            if (input.value.trim() !== "") {
                const log = document.getElementById('usd-chat-log');
                log.innerHTML += `<div class="msg">You: ${input.value}</div>`;
                input.value = "";
            }
        }

        function handleKeyPress(e) { if (e.key === 'Enter') submitTextMessage(); }
    </script>
</body>
</html>
