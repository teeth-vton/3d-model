<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Ultimate Ai</title>
    <style>
        /**
         * ============================================================================
         * GLOBAL CORE CONFIGURATION & FONTS
         * ============================================================================
         */
        :root {
            --font-Glida-Display: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /**
         * ============================================================================
         * USER INTERFACE LAYOUT & CLASSES (COMPACT FIGMA SPECIFICATIONS)
         * ============================================================================
         */
        .voice_agent_main {
            height: auto;
            width: auto;
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        /* Set strictly to 344px width as seen in Figma sizing properties */
        .voice_chat_bot_container {
            width: 344px;
            height: 520px;
            background-color: #000000;
            box-shadow: 0px 0px 16.7px 0px rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            position: absolute;
            bottom: 0;
            right: 0;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8) translateY(20px);
            transform-origin: bottom right;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .voice_chat_bot_container.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .glow_icon_in_chat_box {
            width: 200px;
            height: 200px;
            position: absolute;
            top: -40px;
            left: -30px;
            pointer-events: none;
            z-index: 1;
        }

        .glow_icon_in_chat_box::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(
                270deg,
                #be9644,
                #aa803c,
                #f3dc87,
                #fbefac,
                #f3dc87,
                #aa803c,
                #c49d47
            );
            filter: blur(140px);
            opacity: 0.4;
        }

        .voice_icon_title_and_close_icon_main {
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            box-sizing: border-box;
            margin-top: 15px;
            position: relative;
        }

        .header_title {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .chat_bot_label {
            font-size: 20px;
            letter-spacing: 1.5px;
            font-family: var(--font-Glida-Display);
            font-weight: 600;
            color: #D4AF37; /* Figma Gold text theme */
        }

        #usd-status-box {
            color: #ffffff;
            font-size: 10px;
            font-weight: bold;
            margin-top: 3px;
            opacity: 0.6;
        }

        .chat_box_icon_inside_main {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .chat_box_icon_inside {
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat_box_inside_bot_icon {
            width: 110px;
            height: 110px;
        }

        .chat_main_container {
            width: 100%;
            height: 240px;
            margin-top: 10px;
            padding: 10px 16px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .chat_main_container::-webkit-scrollbar {
            display: none;
        }

        /* Premium Figma Message Bubble with clean thin golden border */
        .bot_message {
            position: relative;
            background-color: #080808;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 16px;
            max-width: 85%;
            color: #ffffff;
            font-size: 13px;
            line-height: 1.5;
            align-self: flex-start;
            margin-left: 8px;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-sizing: border-box;
        }

        .bot_message > p {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bot_message::before {
            content: "";
            position: absolute;
            left: -6.5px;
            bottom: 25%;
            width: 11px;
            height: 11px;
            background-color: #080808;
            border-left: 1px solid rgba(212, 175, 55, 0.25);
            border-top: 1px solid rgba(212, 175, 55, 0.25);
            transform: rotate(-45deg);
            border-top-left-radius: 2px;
        }

        /* Clean modern plain text alignment for user messages as in Figma design */
        .user_message {
            align-self: flex-end;
            text-align: right;
            color: #e0e0e0;
            font-size: 13px;
            margin-bottom: 16px;
            max-width: 85%;
            line-height: 1.5;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-sizing: border-box;
            background: transparent;
            border: none;
            padding: 0;
        }

        .user_message > p {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .chat_icon_and_voice_and_close_icon_container_main {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            box-sizing: border-box;
        }

        .chat_icon_main {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat_icon_main:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        .voice_icon_main {
            width: 90px;
            height: 90px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice_animation_icon {
            width: 90px;
            height: 90px;
            overflow: visible;
        }

        .close_icon_main {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close_icon_main:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        .massge_input_main {
            width: 100%;
            height: 50px;
            padding: 0px 16px;
            margin-top: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .input_box_and_icon_main {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-sizing: border-box;
        }

        .chat_input_box {
            width: 85%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
        }

        .chat_input_box::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .send_button_icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send_button_icon:hover {
            transform: scale(1.1);
        }

        .voice_chat_bot_icon_container {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            cursor: pointer;
            position: absolute;
            bottom: 0;
            right: 0;
            opacity: 1;
            visibility: visible;
            transform: scale(1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: auto;
            box-shadow: 0px 0px 16.7px 0px rgba(255, 255, 255, 0.25);
        }

        .voice_chat_bot_icon_container.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.5);
            pointer-events: none;
        }

        .home_screen_bot_icon {
            width: 76px;
            height: 76px;
        }

        /**
         * ============================================================================
         * TOOLTIP STYLES
         * ============================================================================
         */
        #usd-tooltip {
            background: #D4AF37;
            color: #111;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
            position: relative;
            cursor: pointer;
            display: block; 
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
            z-index: 1000;
        }

        #usd-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 30px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #D4AF37 transparent transparent transparent;
        }

        @keyframes bounce {
            0%, 100% { 
                transform: translateY(0); 
            }
            50% { 
                transform: translateY(-5px); 
            }
        }

        /**
         * ============================================================================
         * RATING & DIALOG CONFIRM OVERLAYS
         * ============================================================================
         */
        #usd-inline-rating {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            text-align: center;
            margin-top: auto;
        }

        #usd-rating-title { 
            color: #fff; 
            font-size: 14px; 
            margin-bottom: 10px; 
            font-weight: bold; 
            letter-spacing: 0.5px;
        }

        .usd-stars { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            cursor: pointer; 
        }

        .usd-star { 
            font-size: 24px; 
            color: #333333; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: transform 0.2s, color 0.2s, text-shadow 0.2s; 
        }

        .usd-star:hover, .usd-star.active { 
            color: #FFD700; 
            transform: scale(1.2);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        #usd-rating-thanks { 
            display: none; 
            color: #D4AF37; 
            font-size: 12px; 
            margin-top: 10px; 
            font-weight: bold; 
        }

        #usd-end-confirm-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.95);
            border-radius: 14px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 101;
            text-align: center;
            padding: 20px;
        }

        .usd-confirm-title { 
            color: #fff; 
            font-size: 15px; 
            margin-bottom: 18px; 
            font-weight: bold; 
        }

        .usd-confirm-btns { 
            display: flex; 
            gap: 15px; 
        }

        .usd-btn-yes { 
            background: #ff4444; 
            color: #fff; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .usd-btn-no { 
            background: #444; 
            color: #fff; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        /**
         * ============================================================================
         * DYNAMIC RAYS PROPAGATION ANIMATIONS (MATCHING ATTACHED IMAGE 1)
         * ============================================================================
         */
        @keyframes pulseRay1 {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.95; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        @keyframes pulseRay2 {
            0% { transform: scale(1); opacity: 0.55; }
            50% { transform: scale(1.18); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.55; }
        }
        @keyframes pulseRay3 {
            0% { transform: scale(1); opacity: 0.25; }
            50% { transform: scale(1.28); opacity: 0.6; }
            100% { transform: scale(1); opacity: 0.25; }
        }

        /* Default resting state concentric animations */
        .ripple-1 { animation: pulseRay1 4.5s ease-in-out infinite; transform-origin: 45px 45px; }
        .ripple-2 { animation: pulseRay2 5s ease-in-out infinite; transform-origin: 45px 45px; }
        .ripple-3 { animation: pulseRay3 5.5s ease-in-out infinite; transform-origin: 45px 45px; }

        /* SPEAKING state: Accelerates circular rays to simulate responsive vocal wave propagation */
        .usd-speaking .ripple-1 { animation: pulseRay1 1.1s ease-in-out infinite !important; }
        .usd-speaking .ripple-2 { animation: pulseRay2 1.3s ease-in-out infinite !important; }
        .usd-speaking .ripple-3 { animation: pulseRay3 1.5s ease-in-out infinite !important; }

        /* THINKING state: Waves drift at moderate computed rate */
        .usd-thinking .ripple-1 { animation: pulseRay1 2.2s ease-in-out infinite !important; }
        .usd-thinking .ripple-2 { animation: pulseRay2 2.5s ease-in-out infinite !important; }
        .usd-thinking .ripple-3 { animation: pulseRay3 2.8s ease-in-out infinite !important; }

        /* LISTENING state: Concentric loops pulse organically */
        .usd-listening .ripple-1 { animation: pulseRay1 1.7s ease-in-out infinite !important; }
        .usd-listening .ripple-2 { animation: pulseRay2 1.9s ease-in-out infinite !important; }
        .usd-listening .ripple-3 { animation: pulseRay3 2.1s ease-in-out infinite !important; }
    </style>
</head>
<body>

    <div id="usd-voice-widget" class="voice_agent_main">
        <!-- TOOLTIP -->
        <div id="usd-tooltip" onclick="openChat(false)">
            Namaste! Tap here to talk about your new smile!
        </div>

        <!-- MAIN CHAT CONTAINER -->
        <div id="usd-chat-container" class="voice_chat_bot_container">
            <!-- GLOWING ORB DECORATION -->
            <div class="glow_icon_in_chat_box"></div>

            <!-- CALL CANCELLATION OVERLAY -->
            <div id="usd-end-confirm-overlay">
                <div class="usd-confirm-title">Want to end the call?</div>
                <div class="usd-confirm-btns">
                    <button class="usd-btn-yes" onclick="confirmEndChat(true)">Yes</button>
                    <button class="usd-btn-no" onclick="confirmEndChat(false)">No</button>
                </div>
            </div>

            <!-- State classes (usd-speaking, usd-listening, usd-thinking) are dynamically toggled on usd-chat-inner-wrap to trigger organic voice morph animations -->
            <div id="usd-chat-inner-wrap" style="height: 100%; display: flex; flex-direction: column; position: relative; z-index: 10;">
                
                <!-- HEADER -->
                <div class="voice_icon_title_and_close_icon_main">
                    <div class="header_title">
                        <div class="chat_bot_label">Ultimate Ai</div>
                        <div id="usd-status-box">Connected 🟢</div>
                    </div>
                </div>

                <!-- TOP ANIMATED GOLDEN MICROPHONE & CONCENTRIC RAYS (MATCHES FIGMA IMAGE 1 SPECIFICATIONS) -->
                <div class="chat_box_icon_inside_main">
                    <div class="chat_box_icon_inside">
                        <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg" class="chat_box_inside_bot_icon">
                            <defs>
                                <linearGradient id="visGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fbefac" />
                                    <stop offset="35%" stop-color="#D4AF37" />
                                    <stop offset="70%" stop-color="#aa803c" />
                                    <stop offset="100%" stop-color="#be9644" />
                                </linearGradient>
                            </defs>
                            <!-- Concentric gold wave loops -->
                            <circle class="ripple-3" cx="45" cy="45" r="41" fill="none" stroke="rgba(212, 175, 55, 0.25)" stroke-width="1.2" />
                            <circle class="ripple-2" cx="45" cy="45" r="33" fill="none" stroke="rgba(212, 175, 55, 0.5)" stroke-width="1.5" />
                            <circle class="ripple-1" cx="45" cy="45" r="25" fill="none" stroke="rgba(212, 175, 55, 0.75)" stroke-width="1.8" />
                            
                            <!-- Solid Concentric Gold Core Circle -->
                            <circle cx="45" cy="45" r="18" fill="url(#visGoldGrad)" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.4))" />
                            
                            <!-- Mic Outline Vector with Diamond Sparkles inside -->
                            <g transform="translate(36.5, 36.5) scale(0.7)">
                                <rect x="5" y="2" width="8" height="12" rx="4" fill="none" stroke="#111111" stroke-width="1.5" />
                                <path d="M2 8 C2 12.5, 16 12.5, 16 8" fill="none" stroke="#111111" stroke-width="1.5" stroke-linecap="round" />
                                <line x1="9" y1="13.5" x2="9" y2="17" stroke="#111111" stroke-width="1.5" stroke-linecap="round" />
                                <line x1="6" y1="17" x2="12" y2="17" stroke="#111111" stroke-width="1.5" stroke-linecap="round" />
                                
                                <!-- Sparkle 1 (Large Diamond Star) -->
                                <path d="M 10.5 4.5 Q 10.5 6.5 12.5 6.5 Q 10.5 6.5 10.5 8.5 Q 10.5 6.5 8.5 6.5 Q 10.5 6.5 10.5 4.5 Z" fill="#111111" transform="scale(0.8) translate(3, -1)" />
                                <!-- Sparkle 2 (Small Diamond Star) -->
                                <path d="M 6.5 8 Q 6.5 9.5 8 9.5 Q 6.5 9.5 6.5 11 Q 6.5 9.5 5 9.5 Q 6.5 9.5 6.5 8 Z" fill="#111111" transform="scale(0.6) translate(1, 3)" />
                            </g>
                        </svg>
                    </div>
                </div>

                <!-- CHAT LOG -->
                <div id="usd-chat-log" class="chat_main_container"></div>
                
                <!-- INTERIM MIC TEXT -->
                <div id="usd-interim-text" style="color: #D4AF37; text-align: center; font-style: italic; font-size: 13px; font-weight: bold; min-height: 18px; margin-bottom: 5px;"></div>
                
                <!-- CONTROLS FOOTER (VOICE MODE ACTIVE) -->
                <div class="chat_icon_and_voice_and_close_icon_container_main" id="usd-voice-controls-footer">
                    <!-- Speech Outline Message Toggle Icon (Figma Image 3) -->
                    <div class="chat_icon_main" onclick="toggleChatMode()" title="Switch to Text Mode">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:100%; height:100%;">
                            <path d="M21 15C21 16.1 20.1 17 19 17H7l-4 4V5c0-1.1 0.9-2 2-2h14c1.1 0 2 0.9 2 2v10z"></path>
                            <line x1="7" y1="8" x2="17" y2="8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"></line>
                            <line x1="7" y1="12" x2="13" y2="12" stroke="#ffffff" stroke-width="2" stroke-linecap="round"></line>
                        </svg>
                    </div>

                    <!-- Concentric Golden Mic Button (Figma Image 1) -->
                    <div class="voice_icon_main is-listening" id="usd-voice-trigger-btn">
                        <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg" class="voice_animation_icon">
                            <defs>
                                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fbefac" />
                                    <stop offset="30%" stop-color="#D4AF37" />
                                    <stop offset="70%" stop-color="#aa803c" />
                                    <stop offset="100%" stop-color="#be9644" />
                                </linearGradient>
                            </defs>
                            <!-- Concentric gold outer circular rings -->
                            <circle class="ripple-3" cx="45" cy="45" r="41" fill="none" stroke="rgba(212, 175, 55, 0.25)" stroke-width="1.2" />
                            <circle class="ripple-2" cx="45" cy="45" r="33" fill="none" stroke="rgba(212, 175, 55, 0.45)" stroke-width="1.5" />
                            <circle class="ripple-1" cx="45" cy="45" r="25" fill="none" stroke="rgba(212, 175, 55, 0.70)" stroke-width="1.8" />
                            
                            <!-- Solid Gradient Golden Circle -->
                            <circle cx="45" cy="45" r="18" fill="url(#goldGrad)" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.4))" />
                            
                            <!-- Inside Outline Mic Vector with sparkle stars -->
                            <g transform="translate(36.5, 36.5) scale(0.7)">
                                <rect x="5" y="2" width="8" height="12" rx="4" fill="none" stroke="#111111" stroke-width="1.5" />
                                <path d="M2 8 C2 12.5, 16 12.5, 16 8" fill="none" stroke="#111111" stroke-width="1.5" stroke-linecap="round" />
                                <line x1="9" y1="13.5" x2="9" y2="17" stroke="#111111" stroke-width="1.5" stroke-linecap="round" />
                                <line x1="6" y1="17" x2="12" y2="17" stroke="#111111" stroke-width="1.5" stroke-linecap="round" />
                                
                                <!-- Star Sparkle 1 (Large Diamond Star) -->
                                <path d="M 10.5 4.5 Q 10.5 6.5 12.5 6.5 Q 10.5 6.5 10.5 8.5 Q 10.5 6.5 8.5 6.5 Q 10.5 6.5 10.5 4.5 Z" fill="#111111" transform="scale(0.8) translate(3, -1)" />
                                <!-- Star Sparkle 2 (Small Diamond Star) -->
                                <path d="M 6.5 8 Q 6.5 9.5 8 9.5 Q 6.5 9.5 6.5 11 Q 6.5 9.5 5 9.5 Q 6.5 9.5 6.5 8 Z" fill="#111111" transform="scale(0.6) translate(1, 3)" />
                            </g>
                        </svg>
                    </div>

                    <!-- Clean Crisp Close Cross Icon (Figma Image 2) -->
                    <div class="close_icon_main" onclick="closeChatBtnClicked()" title="End Conversation">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:100%; height:100%;">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </div>
                </div>

                <!-- TEXT INPUT PANEL (TEXT MODE ACTIVE) -->
                <div class="massge_input_main" id="usd-input-container" style="display: none;">
                    <div class="input_box_and_icon_main">
                        <input type="text" id="usd-text-input" class="chat_input_box" placeholder="Message Here..." onkeypress="handleKeyPress(event)">
                        <div class="send_button_icon" id="usd-send-btn" onclick="submitTextMessage()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:100%; height:100%;">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- INLINE RATING -->
                <div id="usd-inline-rating">
                    <div id="usd-rating-title">Rate your experience</div>

    <script>
        /**

         */
        const RENDER_BACKEND_URL = "https://nikjoshi123-usd-voice-backend.hf.space";
        const WS_URL = "wss://nikjoshi123-usd-voice-backend.hf.space";

        let currentAgentState = 'off'; 
        let chatHistory = [];
        let socket = null;
        let globalStream = null;

        let audioCtx = null;
        let audioChunkQueue = [];
        let isAudioPlaying = false;
        let activeSources = []; 
        let nextPlayTime = 0;   
        let isReplyComplete = false; 
        
        let activeTag = null; 
        let activeBotMessageDiv = null; 
        let activeBotTextSpan = null;
        let lastBotMessageDiv = null;

        let interruptRestartHoldUntil = 0;
        let liveTranscriptHideTimer = null;

        let currentLiveAssistantTag = null;

        // NATIVE BROWSER LIVE TRANSCRIPTION
        let recognition = null;
        let liveUserText = "";
        let finalTranscript = ""; 

        /**
         * ============================================================================
         * 10-SECOND SILENCE TIMEOUT ENGINE
         * ============================================================================
         */
        window.silenceTimeout = null;

        window.resetSilenceTimer = () => {
            clearTimeout(window.silenceTimeout);
            window.silenceTimeout = setTimeout(() => {
                if (currentAgentState === 'listening' && isVoiceMode) {
                    updateState('thinking');
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        socket.send(JSON.stringify({
                            type: 'text_input',
                            text: "SYSTEM INSTRUCTION: The user has been completely silent for 10 seconds. Ask them politely: 'Are you still there? Please let me know if you have any questions.' Do not say anything else.",
                            history: chatHistory,
                            isVoiceMode: true
                        }));
                    }
                }
            }, 10000);
        };

        window.clearSilenceTimer = () => {
            clearTimeout(window.silenceTimeout);
        };

        /**
         * ============================================================================
         * NATIVE BROWSER SPEECH RECOGNITION INIT
         * ============================================================================
         */
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            
            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                liveUserText = (finalTranscript + interimTranscript).trim();
                
                if (liveUserText) {
                    const interimBox = document.getElementById('usd-interim-text');
                    if (interimBox) {
                        interimBox.innerText = "You: " + liveUserText;
                        interimBox.style.color = "#D4AF37";
                    }
                }
            };
            recognition.onerror = (e) => {}; 
        }

        /**
         * ============================================================================
         * WINDOW LOAD EVENT
         * ============================================================================
         */
        window.onload = async () => {
            if (sessionStorage.getItem('usd_chat_active') === 'true') {
                await openChat(true);
            }
        };

        let lastScrollY = window.scrollY || 0;
        let scrollTimeout = null;

        /**
         * ============================================================================
         * SCROLL LISTENER (PULSE EFFECT)
         * ============================================================================
         */
        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY || document.documentElement.scrollTop;
            const tooltip = document.getElementById('usd-tooltip');
            const bubble = document.getElementById('usd-bubble');
            
            if (currentScrollY > 30) {
                if (tooltip) {
                    tooltip.style.opacity = '0';
                    tooltip.style.pointerEvents = 'none';
                }
            } else {
                if (tooltip) {
                    tooltip.style.opacity = '1';
                    tooltip.style.pointerEvents = 'auto';
                }
            }

            let scrollSpeed = Math.abs(currentScrollY - lastScrollY);
            lastScrollY = currentScrollY;

            let dynamicPulseSize = Math.min(20 + (scrollSpeed * 1.5), 80);
            if (bubble) {
                bubble.style.setProperty('--pulse-max', `${dynamicPulseSize}px`);
            }

            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                if (bubble) {
                    bubble.style.setProperty('--pulse-max', '20px');
                }
            }, 150);
        });

        /**
         * ============================================================================
         * TEXT SANITIZATION
         * ============================================================================
         */
        function cleanDisplayText(text = "") {
            let result = String(text || "");
            result = result.replace(new RegExp("\\[(hi|bn|ta|te|mr|gu|kn|ml|pa|or|en)-IN\\]", "gi"), "");
            result = result.replace(new RegExp("<!--[\\s\\S]*?-->", "g"), "");
            result = result.replace(new RegExp("\\s+", "g"), " ");
            return result.trim();
        }

        /**
         * ============================================================================
         * UI STATE MANAGEMENT
         * ============================================================================
         */
        function updateState(newState, statusText = null) {
            currentAgentState = newState;
            const statusBox = document.getElementById('usd-status-box');
            const visualizer = document.getElementById('usd-visualizer');
            const interimBox = document.getElementById('usd-interim-text');
            const voiceTrigger = document.getElementById('usd-voice-trigger-btn');
            
            // Core design class mutation hook for animating rings on state change
            const innerWrap = document.getElementById('usd-chat-inner-wrap');
            if (innerWrap) {
                innerWrap.classList.remove('usd-speaking', 'usd-listening', 'usd-thinking');
                if (newState === 'speaking') {
                    innerWrap.classList.add('usd-speaking');
                } else if (newState === 'listening') {
                    innerWrap.classList.add('usd-listening');
                } else if (newState === 'thinking') {
                    innerWrap.classList.add('usd-thinking');
                }
            }

            if (statusBox) {
                if (newState === 'connecting' || newState === 'off') {
                    if (statusText) statusBox.innerText = statusText;
                } else if (isVoiceMode) {
                    statusBox.innerText = "Connected 🟢"; 
                } else {
                    statusBox.innerText = "Chat Mode Active. Type below.";
                }
            }

            if (newState === 'speaking' || newState === 'listening') {
                if (voiceTrigger) voiceTrigger.classList.add('is-listening');
                if (isVoiceMode && visualizer) visualizer.classList.add('active');
            } else {
                if (voiceTrigger) voiceTrigger.classList.remove('is-listening');
                if (isVoiceMode && visualizer) visualizer.classList.remove('active');
            }

            if (newState === 'listening' && isVoiceMode) {
                isMicSoftwareMuted = false;
                if (window.resetSilenceTimer) window.resetSilenceTimer();

                if (interimBox) {
                    if (liveUserText) {
                        interimBox.innerText = "You: " + liveUserText;
                        interimBox.style.color = "#D4AF37";
                    } else if (!interimBox.innerText.includes("You:")) {
                        interimBox.innerText = "Listening...";
                        interimBox.style.color = "#D4AF37";
                    }
                }
            } else if (newState === 'speaking' && isVoiceMode) {
                isMicSoftwareMuted = false;
                if (window.clearSilenceTimer) window.clearSilenceTimer();
            } else {
                isMicSoftwareMuted = true;
                if (window.clearSilenceTimer) window.clearSilenceTimer();
            }

            if (newState === 'thinking') {
                if (interimBox) {
                    if (liveUserText) {
                        interimBox.innerText = "You: " + liveUserText + " ...";
                        interimBox.style.color = "#ffffff";
                    } else {
                        interimBox.innerText = "Answering...";
                        interimBox.style.color = "#ffffff";
                    }
                }
            }

            if (!isVoiceMode && interimBox && newState !== 'thinking') {
                interimBox.innerText = "";
            }
        }

        /**
         * ============================================================================
         * AUDIO CONTEXT INITIALIZATION
         * ============================================================================
         */
        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

         * ============================================================================

        function syncTranscriptLabel() {
            const label = document.getElementById('usd-live-transcript-label');

            label.innerText = isVoiceMode ? 'Assistant speaking' : 'Assistant typing';
