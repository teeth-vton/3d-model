<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live 3D Patient Scanner</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background-color: #0d1117; color: white; margin: 0; padding: 20px; }
        .header { margin-bottom: 20px; }
        h1 { margin-bottom: 5px; color: #58a6ff; }
        p { color: #8b949e; margin-top: 0; }
        
        .camera-container {
            position: relative; width: 100%; max-width: 500px; margin: 0 auto;
            border-radius: 12px; overflow: hidden; border: 2px solid #30363d;
            background: #000; box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }
        video { width: 100%; display: block; transform: scaleX(-1); }
        
        .face-guide {
            position: absolute; top: 15%; left: 25%; right: 25%; bottom: 15%;
            border: 2px dashed rgba(88, 166, 255, 0.6); border-radius: 50%; pointer-events: none;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.3) inset;
        }

        .flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; transition: opacity 0.15s;
        }

        button {
            background-color: #238636; color: white; border: none; padding: 16px 32px;
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 20px; width: 100%; max-width: 500px; transition: background-color 0.2s;
        }
        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #21262d; color: #8b949e; cursor: not-allowed; }

        #statusText { font-size: 16px; margin-top: 20px; color: #58a6ff; font-weight: 600; min-height: 24px; }

        .gallery { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .gallery img { width: 70px; height: 70px; border-radius: 8px; border: 2px solid #30363d; object-fit: cover; transform: scaleX(-1); }

        model-viewer {
            width: 100%; max-width: 600px; height: 500px; margin: 20px auto;
            background-color: #161b22; border-radius: 12px; display: none;
            border: 1px solid #30363d; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Medical 3D Scanner</h1>
        <p id="instructionText">Step 1: Look straight into the camera.</p>
    </div>

    <div class="camera-container" id="cameraView">
        <video id="webcam" autoplay playsinline></video>
        <div class="face-guide"></div>
        <div class="flash" id="flashEffect"></div>
    </div>

    <button id="captureBtn" onclick="takePhoto()">Capture Front Face</button>
    <p id="statusText"></p>

    <div class="gallery" id="gallery"></div>
    <canvas id="canvas"></canvas>

    <model-viewer id="my3DViewer" src="" camera-controls auto-rotate shadow-intensity="1"></model-viewer>

    <script>
        // ==========================================
        // PASTE YOUR ACTUAL TRIPO API KEY HERE
        // ==========================================
        const API_KEY = "tsk_0OLvfGldGNycdTJn4YS6wmjg0MD_bLTKwsGFppTK68R"; 
        
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const captureBtn = document.getElementById('captureBtn');
        const instructionText = document.getElementById('instructionText');
        const statusText = document.getElementById('statusText');
        const gallery = document.getElementById('gallery');
        const cameraView = document.getElementById('cameraView');
        const viewer = document.getElementById('my3DViewer');
        const flash = document.getElementById('flashEffect');

        let currentStep = 0;
        const steps = ["front", "left", "right"];
        const capturedImagesBase64 = {}; 

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Please allow camera access."); });

        function takePhoto() {
            flash.style.opacity = 1;
            setTimeout(() => { flash.style.opacity = 0; }, 150);

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            const viewName = steps[currentStep];
            capturedImagesBase64[viewName] = imageData;

            const img = document.createElement('img');
            img.src = imageData;
            gallery.appendChild(img);

            currentStep++;

            if (currentStep === 1) {
                instructionText.innerText = "Step 2: Turn your head slightly LEFT.";
                captureBtn.innerText = "Capture Left Profile";
            } else if (currentStep === 2) {
                instructionText.innerText = "Step 3: Turn your head slightly RIGHT.";
                captureBtn.innerText = "Capture Right Profile";
            } else if (currentStep === 3) {
                captureBtn.style.display = "none";
                instructionText.innerText = "Processing 3D Avatar...";
                cameraView.style.display = "none";
                video.srcObject.getTracks().forEach(track => track.stop()); 
                
                // Trigger the live API!
                processToTripoAPI();
            }
        }

        async function base64ToBlob(base64) {
            const res = await fetch(base64);
            return await res.blob();
        }

        async function processToTripoAPI() {
            try {
                statusText.innerText = "Step 1/3: Securing and uploading image data...";
                
                // 1. Upload the 3 images to Tripo to get file_tokens
                const uploadEndpoint = "https://api.tripo3d.ai/v2/openapi/upload"; 
                const tokens = {};
                
                for (const view of steps) {
                    const blob = await base64ToBlob(capturedImagesBase64[view]);
                    const formData = new FormData();
                    formData.append("file", blob, `${view}.jpg`);

                    const uploadRes = await fetch(uploadEndpoint, {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${API_KEY}` },
                        body: formData
                    });
                    
                    if(!uploadRes.ok) throw new Error(`Upload failed for ${view} view.`);
                    const uploadData = await uploadRes.json();
                    
                    // Save the token
                    tokens[view] = uploadData.data.image_token || uploadData.data.file_token; 
                }

                statusText.innerText = "Step 2/3: AI generating 3D Mesh (This takes 1-3 mins)...";

                // 2. Send the Multiview Task to the v3 Endpoint
                const taskPayload = {
                    "inputs": [
                        {"front": tokens.front},
                        {"left": tokens.left},
                        {"right": tokens.right}
                    ],
                    "model": "v3.1-20260211",
                    "texture": true,
                    "pbr": true
                };

                const taskRes = await fetch("https://openapi.tripo3d.ai/v3/generation/multiview-to-model", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(taskPayload)
                });
                
                if(!taskRes.ok) throw new Error("Task creation failed on Tripo servers.");
                const taskData = await taskRes.json();
                const taskId = taskData.data.task_id;

                // 3. Start Polling
                pollTaskStatus(taskId);

            } catch (error) {
                console.error("Tripo API Error:", error);
                statusText.innerText = "Error: " + error.message;
                statusText.style.color = "red";
            }
        }

        function pollTaskStatus(taskId) {
            const pollInterval = setInterval(async () => {
                try {
                    // Check v3 Task Status
                    const response = await fetch(`https://openapi.tripo3d.ai/v3/task/${taskId}`, {
                        method: "GET",
                        headers: { "Authorization": `Bearer ${API_KEY}` }
                    });
                    const taskData = await response.json();
                    const status = taskData.data.status; 

                    if (status === "running" || status === "queued") {
                        let progress = taskData.data.progress || 0;
                        statusText.innerText = `Step 3/3: Rendering textures... ${progress}% Complete`;
                    } 
                    else if (status === "success") {
                        clearInterval(pollInterval);
                        statusText.innerText = "Success! Avatar Generated.";
                        
                        // Display the real generated 3D Model
                        viewer.src = taskData.data.output.model; 
                        viewer.style.display = "block";
                    } 
                    else if (status === "failed" || status === "cancelled") {
                        clearInterval(pollInterval);
                        statusText.innerText = "Error: Generation failed on Tripo Servers.";
                        statusText.style.color = "red";
                    }
                } catch (error) {
                    console.error("Polling Error:", error);
                }
            }, 3000); // Checks every 3 seconds
        }
    </script>
</body>
</html>
