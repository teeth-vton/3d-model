<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Ultimate Ai</title>
    <style>
        /**
         * ============================================================================
         * GLOBAL CORE CONFIGURATION & FONTS
         * ============================================================================
         */
        :root {
            --font-Glida-Display: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /**
         * ============================================================================
         * USER INTERFACE LAYOUT & CLASSES (COMPACT FIGMA SPECIFICATIONS)
         * ============================================================================
         */
        .voice_agent_main {
            height: auto;
            width: auto;
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        /* Set strictly to 344px width as seen in Figma sizing properties */
        .voice_chat_bot_container {
            width: 344px;
            height: 520px;
            background-color: #000000;
            box-shadow: 0px 0px 16.7px 0px rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            position: absolute;
            bottom: 0;
            right: 0;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8) translateY(20px);
            transform-origin: bottom right;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .voice_chat_bot_container.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .glow_icon_in_chat_box {
            width: 200px;
            height: 200px;
            position: absolute;
            top: -40px;
            left: -30px;
            pointer-events: none;
            z-index: 1;
        }

        .glow_icon_in_chat_box::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(
                270deg,
                #be9644,
                #aa803c,
                #f3dc87,
                #fbefac,
                #f3dc87,
                #aa803c,
                #c49d47
            );
            filter: blur(140px);
            opacity: 0.4;
        }

        .voice_icon_title_and_close_icon_main {
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            box-sizing: border-box;
            margin-top: 15px;
            position: relative;
        }

        .header_title {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .chat_bot_label {
            font-size: 20px;
            letter-spacing: 1.5px;
            font-family: var(--font-Glida-Display);
            font-weight: 600;
            color: #D4AF37; /* Figma Gold text theme */
        }

        #usd-status-box {
            color: #ffffff;
            font-size: 10px;
            font-weight: bold;
            margin-top: 3px;
            opacity: 0.6;
        }

        .chat_box_icon_inside_main {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .chat_box_icon_inside {
            width: 96px;
            height: 96px;
        }

        .chat_box_inside_bot_icon {
            width: 96px;
            height: 96px;
        }

        .chat_box_icon_inside > img {
            width: 100%;
            height: 100%;
        }

        .chat_main_container {
            width: 100%;
            height: 240px;
            margin-top: 10px;
            padding: 10px 16px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .chat_main_container::-webkit-scrollbar {
            display: none;
        }

        /* Premium Figma Message Bubble with clean thin golden border */
        .bot_message {
            position: relative;
            background-color: #080808;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 16px;
            max-width: 85%;
            color: #ffffff;
            font-size: 13px;
            line-height: 1.5;
            align-self: flex-start;
            margin-left: 8px;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-sizing: border-box;
        }

        .bot_message > p {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bot_message::before {
            content: "";
            position: absolute;
            left: -6.5px;
            bottom: 25%;
            width: 11px;
            height: 11px;
            background-color: #080808;
            border-left: 1px solid rgba(212, 175, 55, 0.25);
            border-top: 1px solid rgba(212, 175, 55, 0.25);
            transform: rotate(-45deg);
            border-top-left-radius: 2px;
        }

        /* Clean modern plain text alignment for user messages as in Figma design */
        .user_message {
            align-self: flex-end;
            text-align: right;
            color: #e0e0e0;
            font-size: 13px;
            margin-bottom: 16px;
            max-width: 85%;
            line-height: 1.5;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-sizing: border-box;
            background: transparent;
            border: none;
            padding: 0;
        }

        .user_message > p {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .chat_icon_and_voice_and_close_icon_container_main {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            box-sizing: border-box;
        }

        .chat_icon_main {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.8;
        }

        .chat_icon_main:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        /* Clean circular layout container matching concentric rings footprint */
        .voice_icon_main {
            width: 90px;
            height: 90px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice_animation_icon {
            width: 90px;
            height: 90px;
            overflow: visible;
        }

        .close_icon_main {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.8;
        }

        .close_icon_main:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        .massge_input_main {
            width: 100%;
            height: 50px;
            padding: 0px 16px;
            margin-top: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .input_box_and_icon_main {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-sizing: border-box;
        }

        .chat_input_box {
            width: 85%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
        }

        .chat_input_box::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .send_button_icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send_button_icon:hover {
            transform: scale(1.1);
        }

        .voice_chat_bot_icon_container {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            cursor: pointer;
            position: absolute;
            bottom: 0;
            right: 0;
            opacity: 1;
            visibility: visible;
            transform: scale(1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: auto;
            box-shadow: 0px 0px 16.7px 0px rgba(255, 255, 255, 0.25);
        }

        .voice_chat_bot_icon_container.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.5);
            pointer-events: none;
        }

        .home_screen_bot_icon {
            width: 76px;
            height: 76px;
        }

        /**
         * ============================================================================
         * TOOLTIP STYLES
         * ============================================================================
         */
        #usd-tooltip {
            background: #D4AF37;
            color: #111;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
            position: relative;
            cursor: pointer;
            display: block; 
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
            z-index: 1000;
        }

        #usd-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 30px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #D4AF37 transparent transparent transparent;
        }

        @keyframes bounce {
            0%, 100% { 
                transform: translateY(0); 
            }
            50% { 
                transform: translateY(-5px); 
            }
        }

        /**
         * ============================================================================
         * RATING & DIALOG CONFIRM OVERLAYS
         * ============================================================================
         */
        #usd-inline-rating {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            text-align: center;
            margin-top: auto;
        }

        #usd-rating-title { 
            color: #fff; 
            font-size: 14px; 
            margin-bottom: 10px; 
            font-weight: bold; 
            letter-spacing: 0.5px;
        }

        .usd-stars { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            cursor: pointer; 
        }

        .usd-star { 
            font-size: 24px; 
            color: #333333; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: transform 0.2s, color 0.2s, text-shadow 0.2s; 
        }

        .usd-star:hover, .usd-star.active { 
            color: #FFD700; 
            transform: scale(1.2);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        #usd-rating-thanks { 
            display: none; 
            color: #D4AF37; 
            font-size: 12px; 
            margin-top: 10px; 
            font-weight: bold; 
        }

        #usd-end-confirm-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.95);
            border-radius: 14px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 101;
            text-align: center;
            padding: 20px;
        }

        .usd-confirm-title { 
            color: #fff; 
            font-size: 15px; 
            margin-bottom: 18px; 
            font-weight: bold; 
        }

        .usd-confirm-btns { 
            display: flex; 
            gap: 15px; 
        }

        .usd-btn-yes { 
            background: #ff4444; 
            color: #fff; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .usd-btn-no { 
            background: #444; 
            color: #fff; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        /**
         * ============================================================================
         * VOICE RIPPLE ANIMATION (RIPPLE EFFECT FOR THE RING NODES)
         * ============================================================================
         */
        @keyframes ripplePulse {
            0% {
                transform: scale(0.92);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.8;
            }
            100% {
                transform: scale(0.92);
                opacity: 0.3;
            }
        }

        .voice_icon_main svg .ripple-1,
        .voice_icon_main svg .ripple-2,
        .voice_icon_main svg .ripple-3 {
            transform-origin: 45px 45px;
        }

        .voice_icon_main.is-listening svg .ripple-1 {
            animation: ripplePulse 1.8s infinite ease-in-out;
        }

        .voice_icon_main.is-listening svg .ripple-2 {
            animation: ripplePulse 1.8s infinite ease-in-out 0.2s;
        }

        .voice_icon_main.is-listening svg .ripple-3 {
            animation: ripplePulse 1.8s infinite ease-in-out 0.4s;
        }

        /**
         * ============================================================================
         * PREMIUM GLASSY SIRI ORB SPECIFICATIONS
         * ============================================================================
         */
        .fluid-ribbon {
            transform-origin: 50px 50px;
            transition: transform 0.4s ease-out;
        }

        /* Continuous ambient morph animations */
        @keyframes rotateCW {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes rotateCCW {
            0% { transform: rotate(360deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.95); }
            100% { transform: rotate(0deg) scale(1); }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.75; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        /* Default gently drifting state */
        .fluid-ribbon.r1 { animation: rotateCW 12s linear infinite; }
        .fluid-ribbon.r2 { animation: rotateCCW 16s linear infinite; }
        .fluid-ribbon.r3 { animation: rotateCW 14s ease-in-out infinite; }
        .fluid-ribbon.r4 { animation: rotateCCW 18s ease-in-out infinite; }
        .orb-core { animation: pulseGlow 4s ease-in-out infinite; transform-origin: 50px 50px; }

        /* Dynamic SPEAKING activity speeds: morphs dynamically like a voice speaking */
        .usd-speaking .fluid-ribbon.r1 { animation: rotateCW 2.2s linear infinite !important; }
        .usd-speaking .fluid-ribbon.r2 { animation: rotateCCW 2.8s linear infinite !important; }
        .usd-speaking .fluid-ribbon.r3 { animation: rotateCW 2.5s ease-in-out infinite !important; }
        .usd-speaking .fluid-ribbon.r4 { animation: rotateCCW 3.2s ease-in-out infinite !important; }
        .usd-speaking .orb-core { animation: pulseGlow 1s ease-in-out infinite !important; }

        /* Slow computing state: gentle signifying wave computation */
        .usd-thinking .fluid-ribbon.r1 { animation: rotateCW 7s linear infinite !important; }
        .usd-thinking .fluid-ribbon.r2 { animation: rotateCCW 9s linear infinite !important; }
        .usd-thinking .fluid-ribbon.r3 { animation: rotateCW 8s ease-in-out infinite !important; }
        .usd-thinking .fluid-ribbon.r4 { animation: rotateCCW 10s ease-in-out infinite !important; }
        .usd-thinking .orb-core { animation: pulseGlow 1.8s ease-in-out infinite !important; }

        /* Passive listening state */
        .usd-listening .fluid-ribbon.r1 { animation: rotateCW 5s linear infinite !important; }
        .usd-listening .fluid-ribbon.r2 { animation: rotateCCW 6.5s linear infinite !important; }
        .usd-listening .fluid-ribbon.r3 { animation: rotateCW 5.8s ease-in-out infinite !important; }
        .usd-listening .fluid-ribbon.r4 { animation: rotateCCW 7.2s ease-in-out infinite !important; }
        .usd-listening .orb-core { animation: pulseGlow 2.5s ease-in-out infinite !important; }
    </style>
</head>
<body>

    <div id="usd-voice-widget" class="voice_agent_main">
        <!-- TOOLTIP -->
        <div id="usd-tooltip" onclick="openChat(false)">
            Namaste! Tap here to talk about your new smile!
        </div>

        <!-- MAIN CHAT CONTAINER -->
        <div id="usd-chat-container" class="voice_chat_bot_container">
            <!-- GLOWING ORB DECORATION -->
            <div class="glow_icon_in_chat_box"></div>

            <!-- CALL CANCELLATION OVERLAY -->
            <div id="usd-end-confirm-overlay">
                <div class="usd-confirm-title">Want to end the call?</div>
                <div class="usd-confirm-btns">
                    <button class="usd-btn-yes" onclick="confirmEndChat(true)">Yes</button>
                    <button class="usd-btn-no" onclick="confirmEndChat(false)">No</button>
                </div>
            </div>

            <!-- State classes (usd-speaking, usd-listening, usd-thinking) are dynamically toggled on usd-chat-inner-wrap to trigger organic voice morph animations -->
            <div id="usd-chat-inner-wrap" style="height: 100%; display: flex; flex-direction: column; position: relative; z-index: 10;">
                
                <!-- HEADER -->
                <div class="voice_icon_title_and_close_icon_main">
                    <div class="header_title">
                        <div class="chat_bot_label">Ultimate Ai</div>
                        <div id="usd-status-box">Connected 🟢</div>
                    </div>
                </div>

                <!-- TOP ANIMATED GLASSY GOLDEN ORB (EXACT SPECIFICATIONS OF ATTACHED IMAGE) -->
                <div class="chat_box_icon_inside_main">
                    <div class="chat_box_icon_inside">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="chat_box_inside_bot_icon" id="usd-glass-orb-svg">
                            <defs>
                                <!-- Spherical base background highlight -->
                                <radialGradient id="orbBg" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="#111111" />
                                    <stop offset="65%" stop-color="#1b1b1b" />
                                    <stop offset="85%" stop-color="#101010" />
                                    <stop offset="100%" stop-color="#05050a" />
                                </radialGradient>
                                
                                <!-- Golden reflective bounding gold edge -->
                                <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="rgba(212, 175, 55, 0.55)" />
                                    <stop offset="50%" stop-color="rgba(255, 248, 220, 0.75)" />
                                    <stop offset="100%" stop-color="rgba(170, 128, 60, 0.55)" />
                                </linearGradient>

                                <!-- Translucent inner ribbons matching image layers -->
                                <linearGradient id="ribbonGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="rgba(212, 175, 55, 0.65)" />
                                    <stop offset="100%" stop-color="rgba(170, 128, 60, 0.05)" />
                                </linearGradient>
                                
                                <linearGradient id="ribbonGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="rgba(251, 239, 172, 0.75)" />
                                    <stop offset="100%" stop-color="rgba(196, 157, 71, 0.05)" />
                                </linearGradient>
                                
                                <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                                    <stop offset="25%" stop-color="#fbefac" stop-opacity="0.8" />
                                    <stop offset="60%" stop-color="#D4AF37" stop-opacity="0.15" />
                                    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0" />
                                </radialGradient>

                                <!-- Specular reflection path gradient -->
                                <linearGradient id="reflectGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
                                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                                </linearGradient>
                            </defs>

                            <!-- Glass sphere bounding structure -->
                            <circle cx="50" cy="50" r="47" fill="url(#orbBg)" stroke="url(#goldRim)" stroke-width="0.8" />

                            <!-- Concentric morphing organic shapes inside (screend layout) -->
                            <g id="fluid-group">
                                <!-- Amber Ribbon 1 (Top loop) -->
                                <path class="fluid-ribbon r1" d="M18 40 C20 22, 60 12, 80 25 C65 37, 37 37, 18 40 Z" fill="url(#ribbonGrad1)" style="mix-blend-mode: screen;" />
                                
                                <!-- Amber Ribbon 2 (Left loop) -->
                                <path class="fluid-ribbon r2" d="M15 57 C12 40, 42 45, 57 65 C37 70, 22 67, 15 57 Z" fill="url(#ribbonGrad2)" style="mix-blend-mode: screen;" />

                                <!-- Silver Ribbon 3 (Crossing overlay) -->
                                <path class="fluid-ribbon r3" d="M35 80 C55 65, 85 55, 82 37 C72 57, 52 72, 35 80 Z" fill="rgba(255,255,255,0.35)" style="mix-blend-mode: screen;" />

                                <!-- Dense Ribbon 4 (Offset helper) -->
                                <path class="fluid-ribbon r4" d="M30 20 C50 30, 70 50, 55 75 C45 60, 35 40, 30 20 Z" fill="url(#ribbonGrad1)" style="mix-blend-mode: screen;" />
                            </g>

                            <!-- White Hot Center Core Glow -->
                            <circle class="orb-core" cx="50" cy="50" r="22" fill="url(#coreGlow)" style="mix-blend-mode: screen;" />

                            <!-- Specification specular reflection overlay -->
                            <circle cx="50" cy="50" r="47" fill="url(#reflectGrad)" pointer-events="none" />
                            <path d="M20 11 A32 32 0 0 1 80 11 A37 37 0 0 0 20 11 Z" fill="rgba(255,255,255,0.06)" pointer-events="none" />
                        </svg>
                    </div>
                </div>

                <!-- CHAT LOG -->
                <div id="usd-chat-log" class="chat_main_container"></div>
                
                <!-- INTERIM MIC TEXT -->
                <div id="usd-interim-text" style="color: #D4AF37; text-align: center; font-style: italic; font-size: 13px; font-weight: bold; min-height: 18px; margin-bottom: 5px;"></div>
                
                <!-- CONTROLS FOOTER (VOICE MODE ACTIVE) -->
                <div class="chat_icon_and_voice_and_close_icon_container_main" id="usd-voice-controls-footer">
                    <!-- Switch to Text Mode Icon -->
                    <div class="chat_icon_main" onclick="toggleChatMode()" title="Switch to Text Mode">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:100%; height:100%;">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>

                    <!-- Concentric Golden Mic Button -->
                    <div class="voice_icon_main is-listening" id="usd-voice-trigger-btn">
                        <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg" class="voice_animation_icon">
                            <defs>
                                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fbefac" />
                                    <stop offset="30%" stop-color="#D4AF37" />
                                    <stop offset="70%" stop-color="#aa803c" />
                                    <stop offset="100%" stop-color="#be9644" />
                                </linearGradient>
                            </defs>
                            <!-- Concentric thin golden rings -->
                            <circle cx="45" cy="45" r="41" fill="none" stroke="rgba(212, 175, 55, 0.25)" stroke-width="1" class="ripple-3" />
                            <circle cx="45" cy="45" r="33" fill="none" stroke="rgba(212, 175, 55, 0.45)" stroke-width="1" class="ripple-2" />
                            <circle cx="45" cy="45" r="25" fill="none" stroke="rgba(212, 175, 55, 0.70)" stroke-width="1" class="ripple-1" />
                            
                            <!-- Solid Gradient Golden Circle -->

        /**
         * ============================================================================
         * VOICE ACTIVITY DETECTION (VAD) ENGINE
         * ============================================================================
         */
        function getHumanSpeechProfile(dataArray, timeDomainArray, sampleRate = 16000, fftSize = 512) {
            const binHz = sampleRate / fftSize;
            const idx = (hz) => Math.max(0, Math.min(dataArray.length - 1, Math.round(hz / binHz)));

            const speechStart = idx(90);
            const speechEnd = idx(3400);
            const coreStart = idx(180);
            const coreEnd = idx(1200);

            let speechSum = 0, speechCount = 0;
            let coreSum = 0, coreCount = 0;
            let noiseSum = 0, noiseCount = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i];

                if (i >= speechStart && i <= speechEnd) {
                    speechSum += v;
                    speechCount++;
                } else {
                    noiseSum += v;
                    noiseCount++;
                }

                if (i >= coreStart && i <= coreEnd) {
                    coreSum += v;
                    coreCount++;
                }
            }

            let energy = 0;
            for (let i = 0; i < timeDomainArray.length; i++) {
                const centered = (timeDomainArray[i] - 128) / 128;
                energy += centered * centered;
            }
            
            const rms = Math.sqrt(energy / Math.max(1, timeDomainArray.length));
            const speechAvg = speechSum / Math.max(1, speechCount);
            const coreAvg = coreSum / Math.max(1, coreCount);
            const noiseAvg = noiseSum / Math.max(1, noiseCount);
            const speechRatio = speechSum / Math.max(1, (speechSum + noiseSum));
            const coreVsNoise = coreAvg / Math.max(1, noiseAvg);

            const isNearHumanSpeech =
                rms > 0.008 &&            
                speechAvg > 10 &&         
                coreAvg > 12 &&
                speechRatio > 0.55 &&     
                coreVsNoise > 1.20;       

            return { rms, speechAvg, coreAvg, noiseAvg, speechRatio, coreVsNoise, isNearHumanSpeech };
        }

        /**
         * ============================================================================
         * BASE64 AUDIO STREAM DECODER
         * ============================================================================
         */
        async function playAudioChunk(base64) {
            if (!base64) return;
            updateState('speaking');

            try {
                const binaryString = window.atob(base64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.playbackRate.value = 1.0; 
                
                if (nextPlayTime < audioCtx.currentTime) {
                    nextPlayTime = audioCtx.currentTime + 0.05; 
                }
                
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration; 
                
                window.activeAudioSourceNode = source;
                activeSources.push(source);
                
                source.onended = () => {
                    activeSources = activeSources.filter(s => s !== source);
                    checkBotFinishedSpeaking(); 
                };
            } catch (e) {
                console.error("Audio Decode error:", e);
            }
        }

        async function processAudioQueue() {
            if (isAudioPlaying) return;
            isAudioPlaying = true;
            
            while (audioChunkQueue.length > 0) {
                 const chunk = audioChunkQueue.shift(); 
                 await playAudioChunk(chunk.audioBase64);
            }
            
            isAudioPlaying = false;
            checkBotFinishedSpeaking(); 

            setTimeout(() => {
                if (currentAgentState === 'speaking' && activeSources.length === 0) {
                    isReplyComplete = false;
                    updateState('listening');
                    hideLiveTranscript(0);
                }
            }, 3000);
        }

        /**
         * ============================================================================
         * INTERRUPTION CONTROLLER (BARGE-IN)
         * ============================================================================
         */
        function interruptBot() {
            if (!isVoiceMode) return;
            
            if (socket && socket.readyState === WebSocket.OPEN) {
                try {
                    socket.send(JSON.stringify({ type: 'user_interrupt_barge_in' }));
                } catch (e) {}
            }
            
            audioChunkQueue = [];
            isReplyComplete = false; 
            nextPlayTime = 0; 
            interruptRestartHoldUntil = performance.now() + 500; 
            
            liveUserText = "";
            finalTranscript = "";
            if (recognition) { try { recognition.abort(); } catch(e) {} }

            if (window.activeAudioSourceNode) {
                try {
                    window.activeAudioSourceNode.stop();
                    window.activeAudioSourceNode.disconnect();
                } catch(e) {}
            }

            activeSources.forEach(s => {
                try { s.stop(); s.disconnect(); } catch(e) {}
            });
            activeSources = [];
            
            hideLiveTranscript(0);
            activeBotMessageDiv = null;
            activeBotTextSpan = null;
            lastAssistantStreamingText = "";
            
            updateState('listening');
        }

        /**
         * ============================================================================
         * WEBSOCKET & VAD CONTROLLER CORE
         * ============================================================================
         */
        async function startWebSocket() {
            try {
                socket = new WebSocket(WS_URL);

                socket.onopen = async () => {
                    globalStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { 
                            echoCancellation: true, 
                            noiseSuppression: true, 
                            autoGainControl: true 
                        }
                    });

                    const streamCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    const source = streamCtx.createMediaStreamSource(globalStream);
                    
                    const bufferSize = 4096;
                    const processor = streamCtx.createScriptProcessor(bufferSize, 1, 1);
                    const analyser = streamCtx.createAnalyser();
                    analyser.fftSize = 512;

                    const silenceGain = streamCtx.createGain();
                    silenceGain.gain.value = 0;

                    source.connect(analyser);
                    source.connect(processor);
                    processor.connect(silenceGain);
                    silenceGain.connect(streamCtx.destination);

                    if (chatHistory.length === 0) {
                        updateState('thinking'); 
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.send(JSON.stringify({ 
                                type: 'text_input', 
                                text: "SYSTEM INSTRUCTION: Start the conversation by warmly saying EXACTLY this specific phrase and absolutely nothing else: 'Namaste! How can we assist you today? Let's start with your beautiful name, what is your name?'", 
                                history: [],
                                isVoiceMode: isVoiceMode 
                            }));
                        }
                    } else {
                        updateState('listening');
                    }

                    let isRecording = false;
                    let shortPauseTimer = null; 
                    let longPauseTimer = null; 
                    let maxRecordingTimer = null;
                    
                    let consecutiveVoiceFrames = 0; 
                    let consecutiveInterruptFrames = 0; 

                    processor.onaudioprocess = (e) => {
                        if (isMicSoftwareMuted) return;
                        
                        const inputData = e.inputBuffer.getChannelData(0);
                        const pcm16 = new Int16Array(inputData.length);
                        for (let i = 0; i < inputData.length; i++) {
                            pcm16[i] = Math.max(-1, Math.min(1, inputData[i])) * 32767;
                        }
                        
                        if (socket && socket.readyState === WebSocket.OPEN && isRecording) {
                            socket.send(pcm16.buffer); 
                        }
                    };

                    function detectVoice() {
                        const isSpeakingNow = currentAgentState === 'speaking';

                        if (isMicSoftwareMuted && !isSpeakingNow) {
                            requestAnimationFrame(detectVoice);
                            return;
                        }

                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        analyser.getByteFrequencyData(dataArray);

                        const timeDataArray = new Uint8Array(analyser.fftSize);
                        analyser.getByteTimeDomainData(timeDataArray);
                        
                        let voiceSum = 0;
                        let voiceBins = 0;
                        for (let i = 10; i < 96; i++) {
                            voiceSum += dataArray[i];
                            voiceBins++;
                        }
                        let humanVolume = voiceSum / Math.max(1, voiceBins);

                        const speechProfile = getHumanSpeechProfile(
                            dataArray,
                            timeDataArray, 
                            streamCtx.sampleRate || 16000,
                            analyser.fftSize || 512
                        );

                        if (isSpeakingNow) {
                            const isForegroundVoice = speechProfile.isNearHumanSpeech && 
                                                      humanVolume > 15 && 
                                                      speechProfile.rms > 0.01 &&
                                                      speechProfile.coreVsNoise > 1.5 &&
                                                      speechProfile.speechRatio > 0.60;
                                                      
                            if (isForegroundVoice) {
                                consecutiveInterruptFrames++;
                                if (consecutiveInterruptFrames > 50) {
                                    interruptBot();
                                    consecutiveInterruptFrames = 0;
                                }
                            } else {
                                consecutiveInterruptFrames = Math.max(0, consecutiveInterruptFrames - 1);
                            }
                            requestAnimationFrame(detectVoice);
                            return;
                        }

                        if (currentAgentState === 'listening' && isVoiceMode) {
                            if (humanVolume > 10 && window.resetSilenceTimer) {
                                window.resetSilenceTimer();
                            }

                            const volumeIsGood = humanVolume > 15; 
                            const canStartRecording = speechProfile.isNearHumanSpeech && volumeIsGood; 

                            if (canStartRecording) {
                                consecutiveVoiceFrames++;
                            } else {
                                consecutiveVoiceFrames = 0;
                            }

                            if (consecutiveVoiceFrames > 8) { 
                                if (!isRecording) {
                                    isRecording = true;
                                    liveUserText = ""; 
                                    finalTranscript = ""; 
                                    if (recognition) {
                                        try { 
                                            recognition.abort(); 
                                            setTimeout(() => recognition.start(), 50); 
                                        } catch(e) {}
                                    }
                                    updateState('listening'); 
                                    
                                    if (socket.readyState === WebSocket.OPEN) {
                                        socket.send(JSON.stringify({ type: 'start_of_speech' }));
                                    }
                                    
                                    maxRecordingTimer = setTimeout(() => {
                                        if (isRecording) {
                                            isRecording = false;
                                            if (recognition) { try { recognition.stop(); } catch(e) {} }
                                            updateState('thinking');
                                            
                                            if (socket.readyState === WebSocket.OPEN) {
                                                socket.send(JSON.stringify({ 
                                                    type: 'process_final', 
                                                    history: chatHistory, 
                                                    isVoiceMode: isVoiceMode,
                                                    nativeTranscript: liveUserText 
                                                }));
                                            }
                                            
                                            liveUserText = ""; finalTranscript = "";
                                            const interimBox = document.getElementById('usd-interim-text');
                                            if (interimBox) interimBox.innerText = "Answering...";
                                        }
                                    }, 20000); 
                                }
                                
                                clearTimeout(shortPauseTimer);
                                clearTimeout(longPauseTimer);
                                
                                shortPauseTimer = setTimeout(() => {
                                    if (isRecording && socket.readyState === WebSocket.OPEN) {
                                        socket.send(JSON.stringify({ type: 'process_interim' }));
                                    }
                                }, 800); 

                                longPauseTimer = setTimeout(() => {
                                    if (isRecording) {
                                        isRecording = false;
                                        if (recognition) { try { recognition.stop(); } catch(e) {} }
                                        clearTimeout(maxRecordingTimer);
                                        updateState('thinking');
                                        
                                        if (socket.readyState === WebSocket.OPEN) {
                                            socket.send(JSON.stringify({ 
                                                type: 'process_final', 
                                                history: chatHistory, 
                                                isVoiceMode: isVoiceMode,
                                                nativeTranscript: liveUserText 
                                            }));
                                        }
                                        
                                        liveUserText = ""; finalTranscript = "";
                                        const interimBox = document.getElementById('usd-interim-text');
                                        if (interimBox) interimBox.innerText = "Answering...";
                                    }
                                }, 2500); 
                            }
                        }
                        requestAnimationFrame(detectVoice);
                    }
                    
                    detectVoice();
                };

                socket.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'bot_interrupted') {
                        audioChunkQueue = [];
                        if (window.activeAudioSourceNode) {
                            try { window.activeAudioSourceNode.stop(); window.activeAudioSourceNode.disconnect(); } catch (e) {}
                            window.activeAudioSourceNode = null;
                        }
                        activeSources.forEach(s => {
                            try { s.stop(); s.disconnect(); } catch(e) {}
                        });
                        activeSources = [];
                        isAudioPlaying = false;
                        isReplyComplete = false;
                        nextPlayTime = 0;
                        
                        liveUserText = ""; finalTranscript = ""; activeBotMessageDiv = null; activeBotTextSpan = null; lastAssistantStreamingText = "";
                        const interimBox = document.getElementById('usd-interim-text');
                        if (interimBox) { interimBox.innerText = "Listening..."; interimBox.style.color = "#D4AF37"; }
                        
                        updateState('listening');
                        return; 
                    }
                    else if (data.type === 'idle' || data.type === 'error') {
                        hideLiveTranscript(0);
                        liveUserText = ""; 
                        finalTranscript = ""; 
                        if (recognition) { try { recognition.abort(); } catch(e) {} }
                        
                        const interimBox = document.getElementById('usd-interim-text');
                        if (interimBox) interimBox.innerText = "";
                        
                        updateState('listening');
                    }
                    else if (data.type === 'user_spoken_text') {
                        const cleanUserText = cleanDisplayText(data.text || "");
                        
                        if (cleanUserText) {
                            const last = chatHistory[chatHistory.length - 1];
                            const alreadyInHistory = last && last.role === 'user' && last.parts && last.parts[0] && cleanUserText === last.parts[0].text;
                            
                            if (!alreadyInHistory) {
                                logMessage('user', cleanUserText);
                                addUserHistoryIfNew(cleanUserText);
                            }
                            
                            liveUserText = "";
                            finalTranscript = ""; 
                            const interimBox = document.getElementById('usd-interim-text');
                            if (interimBox && interimBox.innerText.includes("You:")) {
                                interimBox.innerText = "Answering...";
                                interimBox.style.color = "#ffffff";
                            }
                        }
                    }
                    else if (data.type === 'interim_transcript') {
                        const interimBox = document.getElementById('usd-interim-text');
                        if (interimBox && data.text) {
                            interimBox.innerText = "You: " + data.text + " ...";
                            interimBox.style.color = "#D4AF37";
                        }
                    }
                    else if (data.type === 'text_stream') {
                        const streamedText = cleanDisplayText(data.text || "");
                        if (!streamedText) return; 

                        lastAssistantStreamingText = streamedText;

                        if (!activeBotMessageDiv) {
                            activeBotMessageDiv = logMessage('bot', streamedText);
                            activeBotTextSpan = activeBotMessageDiv.querySelector('.usd-msg-text');
                        } else if (activeBotTextSpan) {
                            activeBotTextSpan.innerText = streamedText;
                        }

                        const previewTag = data.tag || detectLocalTagFromText(streamedText);
                        updateLiveTranscript(streamedText, previewTag);

                        if (previewTag && usdLinks[previewTag]) {
                            if (!activeBotMessageDiv.querySelector('.usd-link-card')) {
                                appendLinkButton(activeBotMessageDiv, previewTag);
                            }
                        }

                        const log = document.getElementById('usd-chat-log');
                        log.scrollTop = log.scrollHeight;
                    }
                    else if (data.type === 'audio_chunk') {
                        if (isVoiceMode) {
                            audioChunkQueue.push(data);
                            processAudioQueue();
                        }
                    }
                    else if (data.type === 'reply_complete') {
                        isReplyComplete = true; 
                        
                        liveUserText = ""; 
                        finalTranscript = "";
                        const interimBox = document.getElementById('usd-interim-text');
                        if (interimBox) {
                            interimBox.innerText = "";
                        }

                        const botTarget = activeBotMessageDiv; 
                        activeBotMessageDiv = null;
                        activeBotTextSpan = null;

                        const finalText = cleanDisplayText(data.botText || "").trim();
                        const finalTag = data.tag || detectLocalTagFromText(finalText) || detectLocalTagFromText(data.userText || "");

                        if (finalText) {
                            if (botTarget) {
                                const span = botTarget.querySelector('.usd-msg-text');
                                if (span) span.innerText = finalText;
                            } else {
                                lastBotMessageDiv = logMessage('bot', finalText);
                            }

                            const last = chatHistory[chatHistory.length - 1];
                            if (!(last && last.role === 'model' && last.parts && last.parts[0] && last.parts[0].text === finalText)) {
                                chatHistory.push({ role: "model", parts: [{ text: finalText }] });
                                if (chatHistory.length > 6) chatHistory = chatHistory.slice(-6);
                                saveHistory();
                            }
                            
                            updateLiveTranscript(finalText, finalTag, true);
                        } else if (botTarget) {
                            botTarget.remove();
                        }

                        lastAssistantStreamingText = "";
                        currentLiveAssistantText = "";
                        activeTag = finalTag;
                        
                        const finalBotTarget = botTarget || lastBotMessageDiv;
                        if (activeTag && usdLinks[activeTag] && finalBotTarget) {
                            if (!finalBotTarget.querySelector('.usd-link-card')) {
                                appendLinkButton(finalBotTarget, activeTag);
                            }
                            const log = document.getElementById('usd-chat-log');
                            log.scrollTop = log.scrollHeight;
                        }

                        if (!isVoiceMode) {
                            updateState('listening');
                            if (activeTag === '[END_CHAT]') setTimeout(() => closeChat(true), 2000);
                        } else {
                            checkBotFinishedSpeaking(); 
                        }

                        hideLiveTranscript(3500);
                    }
                };

                socket.onerror = () => { updateState('listening'); };

            } catch (err) {
                updateState('listening');
            }
        }

        async function confirmEndChat(isYes) {
            document.getElementById('usd-end-confirm-overlay').style.display = 'none';
            if (isYes) {
                updateState('thinking');
                interruptBot();
                
                const goodbyeText = "Thanks for talking with Ultimate Smile Design. Please feel free to reach out to us at our contact page.";
                logMessage('bot', goodbyeText);
                
                if (isVoiceMode) {
                    try {
                        const response = await fetch(`${RENDER_BACKEND_URL}/api/tts`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: goodbyeText, lang: 'en-IN' })
                        });
                        const data = await response.json();
                        
                        isReplyComplete = true; 
                        audioChunkQueue.push(data);
                        processAudioQueue();
                        
                        setTimeout(() => closeChat(true), 4000);
                    } catch(e) { closeChat(true); }
                } else {
                    setTimeout(() => closeChat(true), 2000);
                }
            }
        }

        function closeChat(showRating = false) {
            updateState('off');
            interruptBot();
            hideLiveTranscript(0);
            if (socket) socket.close();
            if (globalStream) globalStream.getTracks().forEach(track => track.stop());
            
            sessionStorage.removeItem('usd_chat_active');
            sessionStorage.removeItem('usd_chat_history');
            
            const bubble = document.getElementById('usd-bubble');
            const container = document.getElementById('usd-chat-container');

            if (showRating) {
                document.getElementById('usd-input-container').style.display = 'none';
                document.getElementById('usd-voice-controls-footer').style.display = 'none';
                document.getElementById('usd-inline-rating').style.display = 'block';
                logMessage('system', 'The chat has ended. Please rate your experience below.');
            } else {
                if (container) {
                    container.style.display = 'none';
                    container.classList.remove('active');
                }
                if (bubble) {
                    bubble.style.display = 'flex'; 
                    bubble.classList.remove('hidden');
                }
            }
        }

                s.style.textShadow = index < stars ? '0 0 10px rgba(255, 215, 0, 0.6)' : '0 2px 4px rgba(0,0,0,0.5)';

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ 
                        access_key: "c1a373a7-407e-47f4-8403-be692c2f3eff", 
                        subject: `New USD Voice Agent Rating: ${stars}/5 Stars`, 
                        from_name: "Ultimate Smile Voice Agent", 
                        email: "noreply@ultimatesmiledesign.com",
                        message: `Transcript:\n\n${transcript}` 
                    })
                });

            setTimeout(() => { closeChat(false); }, 3000);

        /**
         * ============================================================================
         * LOCAL CHAT DOM INJECTOR (SUPPORTING PRESETS IN LAYOUTS)
         * ============================================================================
         */
        function logMessage(sender, text, tag = null) {
            const log = document.getElementById('usd-chat-log');
            const msgDiv = document.createElement('div');
            
            if (sender === 'user') {
                msgDiv.className = 'user_message';
            } else if (sender === 'bot') {
                msgDiv.className = 'bot_message';
            } else {
                msgDiv.className = 'msg msg-system';
            }
            
            const p = document.createElement('p');
            p.className = 'usd-msg-text';
            
            if (sender === 'user') p.innerText = text;
            else if (sender === 'bot') p.innerText = text;
            else p.innerText = text; 
            
            msgDiv.appendChild(p);

            if (tag && usdLinks[tag]) {
                const btn = document.createElement('button');
                btn.className = 'usd-link-card';
                btn.innerText = usdLinks[tag].label;
                btn.onclick = () => handleLinkClick(tag);
                msgDiv.appendChild(btn);
            }

            log.appendChild(msgDiv);
            log.scrollTop = log.scrollHeight;

            if (sender === 'bot') {
                lastBotMessageDiv = msgDiv;
            }

            return msgDiv;
        }
